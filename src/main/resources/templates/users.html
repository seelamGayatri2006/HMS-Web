<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>HMS - Users</title>
<style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Segoe UI',sans-serif;background:#f8fafc;}.sidebar{width:230px;height:100vh;background:linear-gradient(180deg,#08143a,#0c2860);position:fixed;left:0;top:0;display:flex;flex-direction:column;}.sidebar-logo{padding:28px 22px 20px;border-bottom:1px solid rgba(255,255,255,0.1);}.sidebar-logo h1{color:#fff;font-size:22px;font-weight:700;}.sidebar-logo p{color:#7898d4;font-size:11px;margin-top:3px;}.nav-item{display:flex;align-items:center;padding:11px 22px;color:#bed7ff;font-size:13px;text-decoration:none;border-left:3px solid transparent;}.nav-item:hover,.nav-item.active{background:rgba(255,255,255,0.12);color:#fff;border-left:3px solid #10b981;}.sidebar-user{padding:16px 22px;border-top:1px solid rgba(255,255,255,0.1);}.sidebar-user .name{color:#fff;font-size:13px;font-weight:600;}.sidebar-user .role{color:#7898d4;font-size:11px;}.logout-btn{display:inline-block;margin-top:10px;color:#ff7878;font-size:12px;text-decoration:none;}.main{margin-left:230px;}.topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}.topbar h2{font-size:16px;font-weight:600;}.topbar .time{font-size:12px;color:#64748b;}.content{padding:24px;}.alert{padding:12px 16px;border-radius:8px;margin-bottom:20px;font-size:13px;}.alert-success{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7;}.alert-error{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;}.card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:20px;margin-bottom:20px;}.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:100;justify-content:center;align-items:center;}.modal.show{display:flex;}.modal-box{background:#fff;border-radius:12px;padding:28px;width:460px;max-width:90%;}.modal-title{font-size:15px;font-weight:600;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid #e2e8f0;}.form-group{margin-bottom:14px;}.form-group label{display:block;font-size:12px;font-weight:600;color:#64748b;margin-bottom:5px;}.form-group input,.form-group select{width:100%;padding:9px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;outline:none;}.form-group input:focus,.form-group select:focus{border-color:#6399ff;}.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}.modal-actions{display:flex;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid #e2e8f0;}.btn{display:inline-flex;align-items:center;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;border:none;cursor:pointer;text-decoration:none;gap:6px;}.btn-primary{background:#0f52ba;color:#fff;}.btn-danger{background:#ef4444;color:#fff;}.btn-warning{background:#f59e0b;color:#fff;}.btn-outline{background:#fff;color:#0f52ba;border:1.5px solid #0f52ba;}.btn-sm{padding:5px 12px;font-size:12px;}table{width:100%;border-collapse:collapse;font-size:13px;}thead th{background:#f8fafc;color:#64748b;font-weight:600;padding:12px 14px;text-align:left;border-bottom:2px solid #e2e8f0;}tbody tr{border-bottom:1px solid #f1f5f9;}tbody tr:hover{background:#f8fafc;}tbody td{padding:12px 14px;}.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}.badge-admin{background:#fee2e2;color:#991b1b;}.badge-doctor{background:#dbeafe;color:#1e40af;}.badge-reception{background:#d1fae5;color:#065f46;}.top-actions{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-logo"><h1>+ HMS</h1><p>Hospital Management</p></div>
  <nav style="flex:1;padding:10px 0;">
    <a href="/dashboard" class="nav-item">🏠 Dashboard</a>
    <a href="/patients" class="nav-item">👤 Patients</a>
    <a href="/doctors" class="nav-item">👨‍⚕️ Doctors</a>
    <a href="/appointments" class="nav-item">📅 Appointments</a>
    <a href="/billing" class="nav-item">🧾 Billing</a>
    <a href="/medicines" class="nav-item">💊 Medicine</a>
    <a href="/rooms" class="nav-item">🛏 Rooms</a>
    <a href="/reports" class="nav-item">📊 Reports</a>
    <a href="/users" th:if="${isAdmin}" class="nav-item active">👥 Users</a>
  </nav>
  <div class="sidebar-user">
    <div class="name" th:text="${loggedInUser}">Admin</div>
    <div class="role" th:text="${isAdmin} ? 'ADMIN' : (${isDoctor} ? 'DOCTOR' : 'RECEPTIONIST')">Role</div>
    <a href="/logout" class="logout-btn">⏻ Logout</a>
  </div>
</div>
<div class="main">
<div class="topbar"><h2>User Management</h2><span class="time" id="clock"></span></div>
<div class="content">
  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
  <div class="card">
    <div class="top-actions">
      <span style="font-size:13px;color:#64748b;">System Login Accounts — Admin Only</span>
      <button class="btn btn-primary" onclick="showAddModal()">+ Add User</button>
    </div>
    <table>
      <thead><tr><th>ID</th><th>Username</th><th>Full Name</th><th>Role</th><th>Email</th><th>Actions</th></tr></thead>
      <tbody>
        <tr th:each="u : ${users}">
          <td th:text="${u.user_id}"></td>
          <td th:text="${u.username}"></td>
          <td th:text="${u.full_name}"></td>
          <td>
            <span class="badge"
              th:classappend="${u.role=='ADMIN'?'badge-admin':u.role=='DOCTOR'?'badge-doctor':'badge-reception'}"
              th:text="${u.role}"></span>
          </td>
          <td th:text="${u.email}"></td>
          <td>
            <button class="btn btn-warning btn-sm"
              th:onclick="'showPassModal(' + ${u.user_id} + ')'">Change Password</button>
            <a th:href="@{/users/deactivate/{id}(id=${u.user_id})}"
              class="btn btn-danger btn-sm"
              onclick="return confirm('Deactivate this user?')">Deactivate</a>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(users)}"><td colspan="6" style="text-align:center;color:#94a3b8;padding:20px;">No users found</td></tr>
      </tbody>
    </table>
  </div>
</div>
</div>

<!-- Add User Modal -->
<div class="modal" id="addModal">
  <div class="modal-box">
    <div class="modal-title">👤 Add New User</div>
    <form action="/users/save" method="post">
      <input type="hidden" name="userId" value=""/>
      <div class="form-row">
        <div class="form-group"><label>Full Name *</label><input type="text" name="fullName" required placeholder="John Smith"/></div>
        <div class="form-group"><label>Username *</label><input type="text" name="username" required placeholder="john.smith"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Password *</label><input type="password" name="password" required placeholder="Min 6 characters"/></div>
        <div class="form-group"><label>Role *</label>
          <select name="role">
            <option value="ADMIN">Admin</option>
            <option value="DOCTOR">Doctor</option>
            <option value="RECEPTIONIST">Receptionist</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label>Email</label><input type="email" name="email" placeholder="email@hms.com"/></div>
      <div class="modal-actions">
        <button type="submit" class="btn btn-primary">Add User</button>
        <button type="button" class="btn btn-outline" onclick="hideAddModal()">Cancel</button>
      </div>
    </form>
  </div>
</div>

<!-- Change Password Modal -->
<div class="modal" id="passModal">
  <div class="modal-box">
    <div class="modal-title">🔑 Change Password</div>
    <form id="passForm" method="post">
      <div class="form-group"><label>New Password *</label><input type="password" name="newPassword" required placeholder="Min 6 characters"/></div>
      <div class="modal-actions">
        <button type="submit" class="btn btn-primary">Change Password</button>
        <button type="button" class="btn btn-outline" onclick="hidePassModal()">Cancel</button>
      </div>
    </form>
  </div>
</div>

<script>
function showAddModal(){document.getElementById('addModal').classList.add('show');}
function hideAddModal(){document.getElementById('addModal').classList.remove('show');}
function showPassModal(id){
  document.getElementById('passForm').action='/users/password/'+id;
  document.getElementById('passModal').classList.add('show');
}
function hidePassModal(){document.getElementById('passModal').classList.remove('show');}
function updateClock(){document.getElementById('clock').textContent=new Date().toLocaleTimeString();}
setInterval(updateClock,1000);updateClock();
</script>
</body></html>
