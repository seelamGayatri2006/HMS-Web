    <!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>HMS - Generate Bill</title>
<style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Segoe UI',sans-serif;background:#f8fafc;}.sidebar{width:230px;height:100vh;background:linear-gradient(180deg,#08143a,#0c2860);position:fixed;left:0;top:0;display:flex;flex-direction:column;}.sidebar-logo{padding:28px 22px 20px;border-bottom:1px solid rgba(255,255,255,0.1);}.sidebar-logo h1{color:#fff;font-size:22px;font-weight:700;}.sidebar-logo p{color:#7898d4;font-size:11px;margin-top:3px;}.nav-item{display:flex;align-items:center;padding:11px 22px;color:#bed7ff;font-size:13px;text-decoration:none;border-left:3px solid transparent;}.nav-item:hover,.nav-item.active{background:rgba(255,255,255,0.12);color:#fff;border-left:3px solid #10b981;}.sidebar-user{padding:16px 22px;border-top:1px solid rgba(255,255,255,0.1);}.sidebar-user .name{color:#fff;font-size:13px;font-weight:600;}.sidebar-user .role{color:#7898d4;font-size:11px;}.logout-btn{display:inline-block;margin-top:10px;color:#ff7878;font-size:12px;text-decoration:none;}.main{margin-left:230px;}.topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}.topbar h2{font-size:16px;font-weight:600;}.topbar .time{font-size:12px;color:#64748b;}.content{padding:24px;}.card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:28px;max-width:800px;}.card-title{font-size:15px;font-weight:600;color:#0f172a;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid #e2e8f0;}.form-group{margin-bottom:16px;}.form-group label{display:block;font-size:12px;font-weight:600;color:#64748b;margin-bottom:6px;}.form-group input,.form-group select{width:100%;padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;outline:none;}.form-group input:focus,.form-group select:focus{border-color:#6399ff;}.items-table{width:100%;border-collapse:collapse;margin-bottom:12px;font-size:13px;}.items-table th{background:#f8fafc;padding:10px 12px;text-align:left;font-weight:600;color:#64748b;border-bottom:2px solid #e2e8f0;}.items-table td{padding:8px 6px;border-bottom:1px solid #f1f5f9;}.items-table input,.items-table select{width:100%;padding:7px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;outline:none;}.form-actions{display:flex;gap:12px;margin-top:24px;padding-top:20px;border-top:1px solid #e2e8f0;}.btn{display:inline-flex;align-items:center;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;border:none;cursor:pointer;text-decoration:none;gap:6px;}.btn-primary{background:#0f52ba;color:#fff;}.btn-success{background:#10b981;color:#fff;}.btn-outline{background:#fff;color:#0f52ba;border:1.5px solid #0f52ba;}.btn-sm{padding:6px 12px;font-size:12px;}.section-title{font-size:13px;font-weight:600;color:#0f172a;margin-bottom:10px;margin-top:20px;}</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-logo"><h1>+ HMS</h1><p>Hospital Management</p></div>
  <nav style="flex:1;padding:10px 0;">
    <a href="/dashboard" class="nav-item">🏠 Dashboard</a>
    <a href="/patients" class="nav-item">👤 Patients</a>
    <a href="/doctors" class="nav-item">👨‍⚕️ Doctors</a>
    <a href="/appointments" class="nav-item">📅 Appointments</a>
    <a href="/billing" class="nav-item active">🧾 Billing</a>
    <a href="/medicines" class="nav-item">💊 Medicine</a>
    <a href="/rooms" class="nav-item">🛏 Rooms</a>
    <a href="/reports" class="nav-item">📊 Reports</a>
    <a href="/users" th:if="${isAdmin}" class="nav-item">👥 Users</a>
  </nav>
  <div class="sidebar-user">
    <div class="name" th:text="${loggedInUser}">Admin</div>
    <div class="role" th:text="${isAdmin} ? 'ADMIN' : (${isDoctor} ? 'DOCTOR' : 'RECEPTIONIST')">Role</div>
    <a href="/logout" class="logout-btn">⏻ Logout</a>
  </div>
</div>
<div class="main">    
<div class="topbar"><h2>Generate Bill</h2><span class="time" id="clock"></span></div>
<div class="content">
  <div class="card">
    <div class="card-title">🧾 New Bill</div>
    <form action="/billing/save" method="post" id="billForm">
      <div class="form-group">
        <label>Select Patient *</label>
        <select name="patientId" required>
          <option value="">-- Select Patient --</option>
          <option th:each="p : ${patients}" th:value="${p.patient_id}" th:text="${p.patient_id} + ' — ' + ${p.full_name}"></option>
        </select>
      </div>
      <div class="section-title">Line Items</div>
      <table class="items-table">
        <thead><tr><th>Description</th><th>Category</th><th>Qty</th><th>Unit Price (₹)</th><th></th></tr></thead>
        <tbody id="itemsBody">
          <tr>
            <td><input type="text" name="descriptions" placeholder="Consultation Fee" value="Consultation Fee"/></td>
            <td><select name="categories"><option value="CONSULTATION">Consultation</option><option value="TEST">Test</option><option value="MEDICINE">Medicine</option><option value="ROOM">Room</option><option value="OTHER">Other</option></select></td>
            <td><input type="number" name="quantities" value="1" min="1" style="width:70px;"/></td>
            <td><input type="number" name="unitPrices" value="500" step="0.01" style="width:100px;"/></td>
            <td><button type="button" onclick="removeRow(this)" style="background:#fee2e2;color:#991b1b;border:none;padding:6px 10px;border-radius:6px;cursor:pointer;">✕</button></td>
          </tr>
        </tbody>
      </table>
      <button type="button" onclick="addRow()" class="btn btn-success btn-sm">+ Add Item</button>
      <div class="form-group" style="margin-top:16px;max-width:200px;">
        <label>Discount (₹)</label>
        <input type="number" name="discount" value="0" step="0.01"/>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">🧾 Generate Bill</button>
        <a href="/billing" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
</div>
<script>
function addRow(){
  var tbody=document.getElementById('itemsBody');
  var row=`<tr>
    <td><input type="text" name="descriptions" placeholder="Item description"/></td>
    <td><select name="categories"><option value="CONSULTATION">Consultation</option><option value="TEST">Test</option><option value="MEDICINE">Medicine</option><option value="ROOM">Room</option><option value="OTHER">Other</option></select></td>
    <td><input type="number" name="quantities" value="1" min="1" style="width:70px;"/></td>
    <td><input type="number" name="unitPrices" value="0" step="0.01" style="width:100px;"/></td>
    <td><button type="button" onclick="removeRow(this)" style="background:#fee2e2;color:#991b1b;border:none;padding:6px 10px;border-radius:6px;cursor:pointer;">✕</button></td>
  </tr>`;
  tbody.insertAdjacentHTML('beforeend',row);
}
function removeRow(btn){btn.closest('tr').remove();}
function updateClock(){document.getElementById('clock').textContent=new Date().toLocaleTimeString();}setInterval(updateClock,1000);updateClock();
</script>
</body></html>
