<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>HMS - Billing</title>
<style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Segoe UI',sans-serif;background:#f8fafc;}.sidebar{width:230px;height:100vh;background:linear-gradient(180deg,#08143a,#0c2860);position:fixed;left:0;top:0;display:flex;flex-direction:column;}.sidebar-logo{padding:28px 22px 20px;border-bottom:1px solid rgba(255,255,255,0.1);}.sidebar-logo h1{color:#fff;font-size:22px;font-weight:700;}.sidebar-logo p{color:#7898d4;font-size:11px;margin-top:3px;}.nav-item{display:flex;align-items:center;padding:11px 22px;color:#bed7ff;font-size:13px;text-decoration:none;border-left:3px solid transparent;}.nav-item:hover,.nav-item.active{background:rgba(255,255,255,0.12);color:#fff;border-left:3px solid #10b981;}.sidebar-user{padding:16px 22px;border-top:1px solid rgba(255,255,255,0.1);}.sidebar-user .name{color:#fff;font-size:13px;font-weight:600;}.sidebar-user .role{color:#7898d4;font-size:11px;}.logout-btn{display:inline-block;margin-top:10px;color:#ff7878;font-size:12px;text-decoration:none;}.main{margin-left:230px;}.topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}.topbar h2{font-size:16px;font-weight:600;}.topbar .time{font-size:12px;color:#64748b;}.content{padding:24px;}.alert{padding:12px 16px;border-radius:8px;margin-bottom:20px;font-size:13px;}.alert-success{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7;}.alert-error{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;}.card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:20px;}.btn{display:inline-flex;align-items:center;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;border:none;cursor:pointer;text-decoration:none;gap:6px;}.btn-primary{background:#0f52ba;color:#fff;}.btn-outline{background:#fff;color:#0f52ba;border:1.5px solid #0f52ba;}.btn-sm{padding:5px 12px;font-size:12px;}table{width:100%;border-collapse:collapse;font-size:13px;}thead th{background:#f8fafc;color:#64748b;font-weight:600;padding:12px 14px;text-align:left;border-bottom:2px solid #e2e8f0;}tbody tr{border-bottom:1px solid #f1f5f9;}tbody tr:hover{background:#f8fafc;}tbody td{padding:12px 14px;}.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}.badge-success{background:#d1fae5;color:#065f46;}.badge-danger{background:#fee2e2;color:#991b1b;}.badge-warning{background:#fef3c7;color:#92400e;}.top-actions{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-logo"><h1>+ HMS</h1><p>Hospital Management</p></div>
  <nav style="flex:1;padding:10px 0;">
    <a href="/dashboard" class="nav-item">🏠 Dashboard</a>
    <a href="/patients" class="nav-item">👤 Patients</a>
    <a href="/doctors" class="nav-item">👨‍⚕️ Doctors</a>
    <a href="/appointments" class="nav-item">📅 Appointments</a>
    <a href="/billing" class="nav-item active">🧾 Billing</a>
    <a href="/medicines" class="nav-item">💊 Medicine</a>
    <a href="/rooms" class="nav-item">🛏 Rooms</a>
    <a href="/reports" class="nav-item">📊 Reports</a>
    <a href="/users" th:if="${isAdmin}" class="nav-item">👥 Users</a>
  </nav>
  <div class="sidebar-user">
    <div class="name" th:text="${loggedInUser}">Admin</div>
    <div class="role" th:text="${isAdmin} ? 'ADMIN' : (${isDoctor} ? 'DOCTOR' : 'RECEPTIONIST')">Role</div>
    <a href="/logout" class="logout-btn">⏻ Logout</a>
  </div>
</div>
<div class="main">
<div class="topbar"><h2>Billing</h2><span class="time" id="clock"></span></div>
<div class="content">
  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
  <div class="card">
    <div class="top-actions">
      <span style="font-size:13px;color:#64748b;">All Bills</span>
      <a th:if="${isAdmin}" href="/billing/add" class="btn btn-primary">+ Generate Bill</a>
    </div>
    <table>
      <thead>
        <tr>
          <th>Bill ID</th><th>Patient</th><th>Date</th><th>Subtotal</th>
          <th>Tax</th><th>Total</th><th>Paid</th><th>Status</th><th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="b : ${bills}">
          <td th:text="${b.bill_id}"></td>
          <td th:text="${b.patient_name}"></td>
          <td th:text="${b.bill_date}"></td>
          <td th:text="'₹' + ${b.subtotal}"></td>
          <td th:text="'₹' + ${b.tax}"></td>
          <td th:text="'₹' + ${b.total_amount}"></td>
          <td th:text="'₹' + ${b.paid_amount}"></td>
          <td>
            <span class="badge"
              th:classappend="${b.payment_status=='PAID'?'badge-success':b.payment_status=='PENDING'?'badge-danger':'badge-warning'}"
              th:text="${b.payment_status}"></span>
          </td>
          <td><a th:href="@{/billing/view/{id}(id=${b.bill_id})}" class="btn btn-outline btn-sm">View</a></td>
        </tr>
        <tr th:if="${#lists.isEmpty(bills)}">
          <td colspan="9" style="text-align:center;color:#94a3b8;padding:20px;">No bills found</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
</div>
<script>function updateClock(){document.getElementById('clock').textContent=new Date().toLocaleTimeString();}setInterval(updateClock,1000);updateClock();</script>
</body>
</html>
