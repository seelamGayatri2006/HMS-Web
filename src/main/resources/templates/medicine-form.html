<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>HMS - Medicine Form</title>
<style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Segoe UI',sans-serif;background:#f8fafc;}.sidebar{width:230px;height:100vh;background:linear-gradient(180deg,#08143a,#0c2860);position:fixed;left:0;top:0;display:flex;flex-direction:column;}.sidebar-logo{padding:28px 22px 20px;border-bottom:1px solid rgba(255,255,255,0.1);}.sidebar-logo h1{color:#fff;font-size:22px;font-weight:700;}.sidebar-logo p{color:#7898d4;font-size:11px;margin-top:3px;}.nav-item{display:flex;align-items:center;padding:11px 22px;color:#bed7ff;font-size:13px;text-decoration:none;border-left:3px solid transparent;}.nav-item:hover,.nav-item.active{background:rgba(255,255,255,0.12);color:#fff;border-left:3px solid #10b981;}.sidebar-user{padding:16px 22px;border-top:1px solid rgba(255,255,255,0.1);}.sidebar-user .name{color:#fff;font-size:13px;font-weight:600;}.sidebar-user .role{color:#7898d4;font-size:11px;}.logout-btn{display:inline-block;margin-top:10px;color:#ff7878;font-size:12px;text-decoration:none;}.main{margin-left:230px;}.topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}.topbar h2{font-size:16px;font-weight:600;}.topbar .time{font-size:12px;color:#64748b;}.content{padding:24px;}.card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:28px;max-width:700px;}.card-title{font-size:15px;font-weight:600;color:#0f172a;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid #e2e8f0;}.form-group{margin-bottom:16px;}.form-group label{display:block;font-size:12px;font-weight:600;color:#64748b;margin-bottom:6px;}.form-group input,.form-group select{width:100%;padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;font-family:inherit;outline:none;transition:border 0.2s;}.form-group input:focus,.form-group select:focus{border-color:#6399ff;}.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}.form-actions{display:flex;gap:12px;margin-top:24px;padding-top:20px;border-top:1px solid #e2e8f0;}.btn{display:inline-flex;align-items:center;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;border:none;cursor:pointer;text-decoration:none;gap:6px;}.btn-primary{background:#0f52ba;color:#fff;}.btn-outline{background:#fff;color:#0f52ba;border:1.5px solid #0f52ba;}</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-logo"><h1>+ HMS</h1><p>Hospital Management</p></div>
  <nav style="flex:1;padding:10px 0;">
    <a href="/dashboard" class="nav-item">🏠 Dashboard</a>
    <a href="/patients" class="nav-item">👤 Patients</a>
    <a href="/doctors" class="nav-item">👨‍⚕️ Doctors</a>
    <a href="/appointments" class="nav-item">📅 Appointments</a>
    <a href="/billing" class="nav-item">🧾 Billing</a>
    <a href="/medicines" class="nav-item active">💊 Medicine</a>
    <a href="/rooms" class="nav-item">🛏 Rooms</a>
    <a href="/reports" class="nav-item">📊 Reports</a>
    <a href="/users" th:if="${isAdmin}" class="nav-item">👥 Users</a>
  </nav>
  <div class="sidebar-user">
    <div class="name" th:text="${loggedInUser}">Admin</div>
    <div class="role" th:text="${isAdmin} ? 'ADMIN' : (${isDoctor} ? 'DOCTOR' : 'RECEPTIONIST')">Role</div>
    <a href="/logout" class="logout-btn">⏻ Logout</a>
  </div>
</div>
<div class="main">
<div class="topbar"><h2 th:text="${medicine != null} ? 'Edit Medicine' : 'Add Medicine'">Medicine Form</h2><span class="time" id="clock"></span></div>
<div class="content">
  <div class="card">
    <div class="card-title">💊 Medicine Details</div>
    <form action="/medicines/save" method="post">
      <input type="hidden" name="medicineId" th:value="${medicine?.medicine_id}"/>
      <div class="form-row">
        <div class="form-group"><label>Medicine Name *</label><input type="text" name="name" th:value="${medicine?.name}" required placeholder="Paracetamol 500mg"/></div>
        <div class="form-group">
          <label>Category *</label>
          <select name="category" required>
            <option value="TABLET"    th:selected="${medicine?.category == 'TABLET'}">Tablet</option>
            <option value="CAPSULE"   th:selected="${medicine?.category == 'CAPSULE'}">Capsule</option>
            <option value="SYRUP"     th:selected="${medicine?.category == 'SYRUP'}">Syrup</option>
            <option value="INJECTION" th:selected="${medicine?.category == 'INJECTION'}">Injection</option>
            <option value="OINTMENT"  th:selected="${medicine?.category == 'OINTMENT'}">Ointment</option>
            <option value="OTHER"     th:selected="${medicine?.category == 'OTHER'}">Other</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Manufacturer</label><input type="text" name="manufacturer" th:value="${medicine?.manufacturer}" placeholder="Sun Pharma"/></div>
        <div class="form-group"><label>Unit Price (₹)</label><input type="number" name="unitPrice" th:value="${medicine?.unit_price}" placeholder="10.00" step="0.01"/></div>
      </div>
      <div class="form-row-3">
        <div class="form-group"><label>Stock Quantity</label><input type="number" name="stockQuantity" th:value="${medicine?.stock_quantity}" placeholder="100"/></div>
        <div class="form-group"><label>Reorder Level</label><input type="number" name="reorderLevel" th:value="${medicine?.reorder_level}" placeholder="20"/></div>
        <div class="form-group"><label>Expiry Date</label><input type="date" name="expiryDate" th:value="${medicine?.expiry_date}"/></div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">💾 Save Medicine</button>
        <a href="/medicines" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
</div>
<script>function updateClock(){document.getElementById('clock').textContent=new Date().toLocaleTimeString();}setInterval(updateClock,1000);updateClock();</script>
</body></html>
